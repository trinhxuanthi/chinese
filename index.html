<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ứng Dụng Học Từ Vựng Tiếng Trung</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
      :root {
        --primary: #5c7cfa;
        --success: #2ed573;
        --danger: #ff4757;
        --warning: #eccc68;
        
        /* Dark Mode */
        --bg-body: #1e222b;
        --bg-card: #252a37;
        --bg-input: #1c202c;
        --border: #3d4659;
        --text-main: #f1f2f6;
        --text-title: #ffffff;
        --text-muted: #a4b0be;
      }

      [data-theme="light"] {
        --bg-body: #f0f2f5;
        --bg-card: #ffffff;
        --bg-input: #f1f3f5;
        --border: #ced4da;
        --text-main: #2f3542;
        --text-title: #1e222b;
        --text-muted: #747d8c;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg-body);
        color: var(--text-main);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
        transition: background 0.3s, color 0.3s;
      }

      .game-container {
        background: var(--bg-card);
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 600px;
        border: 1px solid var(--border);
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 20px;
        transition: background 0.3s, border-color 0.3s;
        text-align: center;
      }

      .header-wrapper {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        background: var(--bg-input);
        padding: 5px 15px;
        border-radius: 10px;
        box-sizing: border-box;
      }

      .main-title {
        font-size: 15px;
        font-weight: bold;
        color: var(--text-title);
        flex: 1;
        text-align: left;
      }

      .btn-theme {
        background: var(--bg-card);
        color: var(--text-main);
        padding: 6px 12px;
        font-size: 13px;
        border: 1px solid var(--border);
        border-radius: 8px;
        cursor: pointer;
      }

      .file-selector {
        background: #eccc68;
        padding: 10px;
        border-radius: 12px;
        font-size: 13px;
        font-weight: bold;
        color: #2f3542;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .lesson-selector-zone {
        background: var(--bg-input);
        padding: 12px;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        font-size: 14px;
      }

      .lesson-select-ctrl {
        padding: 8px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg-card);
        color: var(--text-main);
        font-size: 14px;
        font-weight: bold;
        width: 100%;
        cursor: pointer;
      }

      .status-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 14px;
        color: var(--text-muted);
        padding: 0 5px;
      }

      .progress-container {
        width: 60%;
        background: var(--bg-input);
        height: 8px;
        border-radius: 4px;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        width: 0%;
        background: var(--primary);
        transition: width 0.2s ease;
      }

      .chinese-word-wrapper {
        margin: 10px 0;
        min-height: 200px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 15px;
        width: 100%;
      }

      .chinese-word {
        font-family: "KaiTi", "STKaiti", "华文楷体", "Noto Serif SC", serif;
        font-size: 130px;
        color: var(--text-title);
        cursor: pointer;
        text-align: center;
        width: 100%;
      }

      .writer-container {
        border: 2px dashed var(--border);
        background: var(--bg-input);
        border-radius: 12px;
        padding: 8px;
        display: inline-block;
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.1);
      }

      .answer-box {
        min-height: 80px;
        background: var(--bg-input);
        border-radius: 12px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        box-sizing: border-box;
        gap: 6px;
      }
      .pinyin-correct-ans {
        font-size: 22px;
        color: var(--danger);
        font-weight: bold;
      }
      .meaning {
        font-size: 20px;
        color: var(--success);
        font-weight: bold;
      }
      .hint {
        font-size: 15px;
        color: var(--warning);
        font-style: italic;
        margin-top: 4px;
        line-height: 1.4;
      }

      .nav-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      button {
        padding: 14px;
        font-size: 15px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        color: white;
        transition: all 0.2s;
        text-align: center;
      }
      button:active {
        transform: scale(0.96);
      }
      .btn-nav {
        background: #4b5563;
      }
      .btn-nav:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .btn-reveal {
        background: #10b981;
        font-size: 16px;
      }
      .btn-audio {
        background: #2563eb;
      }
      .btn-write-mode {
        background: #2980b9;
      }
      .btn-write-mode.active {
        background: #e67e22;
      }
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <script>
      (function () {
        const savedTheme = localStorage.getItem("chinese_study_theme");
        if (savedTheme === "light") {
          document.documentElement.setAttribute("data-theme", "light");
        } else if (savedTheme === null) {
          localStorage.setItem("chinese_study_theme", "dark");
        }
      })();
    </script>

    <div class="game-container">
      <!-- TIÊU ĐỀ & ĐỔI THEME -->
      <div class="header-wrapper">
        <div class="main-title">📖 HỌC TỪ VỰNG TIẾNG TRUNG</div>
        <button class="btn-theme" id="btnThemeToggle" onclick="toggleTheme()">☀️ Sáng</button>
      </div>

      <!-- CHỌN FILE TỪ VỰNG -->
      <div class="file-selector">
        <label style="cursor: pointer;">📂 Chọn File Dữ Liệu Từ Vựng (JSON):</label>
        <input type="file" accept=".json" onchange="docFileJSON(this)" style="color: #2f3542; font-size: 12px; max-width: 100%;" />
      </div>

      <!-- CHỌN BÀI HỌC -->
      <div class="lesson-selector-zone">
        <label style="font-weight: bold; color: var(--text-muted); text-align: left; display: block;">Chọn Bài Học:</label>
        <select id="selectLesson" class="lesson-select-ctrl" onchange="filterLessonData()">
          <option value="all">-- Loading Bài Học... --</option>
        </select>
      </div>

      <!-- TRẠNG THÁI TIẾN ĐỘ -->
      <div class="status-bar">
        <span id="word-count">Từ: 0 / 0</span>
        <div class="progress-container">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <!-- KHU VỰC HIỂN THỊ CHỮ HÁN CHÍNH GIỮA -->
      <div class="chinese-word-wrapper" id="wordWrapper">
        <div class="chinese-word" id="word" onclick="speak()">...</div>
      </div>

      <!-- NÚT BẤM HIỆN ĐÁP ÁN -->
      <button class="btn-reveal" id="btnReveal" onclick="revealAnswer()">👁️ Hiện Đáp Án</button>

      <!-- KHUNG THÔNG TIN CHI TIẾT (ẨN MẶC ĐỊNH) -->
      <div class="answer-box">
        <div id="pinyin-correct" class="pinyin-correct-ans hidden">Phiên âm: ...</div>
        <div id="meaning" class="meaning hidden">Nghĩa từ vựng</div>
        <div id="hint" class="hint hidden">Mẹo ghi nhớ</div>
      </div>

      <!-- HỆ THỐNG ĐIỀU KHIỂN -->
      <div class="nav-grid">
        <button class="btn-nav" id="btnPrev" onclick="prevWord()">◀ Trước</button>
        <button class="btn-nav" id="btnNext" onclick="nextWord()">Sau ▶</button>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button class="btn-audio" onclick="speak()">🔊 Phát Âm</button>
        <button class="btn-write-mode" id="btnWriteMode" onclick="toggleWriteMode()">✍️ Chế độ: Nhìn Chữ</button>
      </div>
    </div>

    <script>
      let originalData = [];
      let vocabularyData = [];
      let currentIndex = 0;
      let isWriteMode = false;
      let writerInstances = [];

      function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute("data-theme");
        const btn = document.getElementById("btnThemeToggle");
        if (currentTheme === "light") {
          document.documentElement.removeAttribute("data-theme");
          localStorage.setItem("chinese_study_theme", "dark");
          btn.innerText = "☀️ Sáng";
        } else {
          document.documentElement.setAttribute("data-theme", "light");
          localStorage.setItem("chinese_study_theme", "light");
          btn.innerText = "🌙 Tối";
        }
        setTimeout(() => loadWord(currentIndex), 50);
      }

      function docFileJSON(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function (e) {
          try {
            const data = JSON.parse(e.target.result);
            if (Array.isArray(data)) {
              originalData = data;
              initLessonSelector();
              filterLessonData();
            } else {
              alert("Cấu trúc file JSON không hợp lệ (Phải là một Mảng dữ liệu).");
            }
          } catch (err) {
            alert("Không thể đọc file JSON này, vui lòng kiểm tra lại định dạng.");
          }
        };
        reader.readAsText(file);
      }

      function initLessonSelector() {
        const select = document.getElementById("selectLesson");
        select.innerHTML = '<option value="all">Tất cả các bài</option>';
        const lessons = [...new Set(originalData.map(item => item.lesson))].sort((a, b) => a - b);
        lessons.forEach(l => {
          if (l) {
            const opt = document.createElement("option");
            opt.value = l;
            opt.innerText = `Bài số ${l}`;
            select.appendChild(opt);
          }
        });
      }

      function filterLessonData() {
        const val = document.getElementById("selectLesson").value;
        if (val === "all") {
          vocabularyData = [...originalData];
        } else {
          vocabularyData = originalData.filter(item => item.lesson == val);
        }
        currentIndex = 0;
        loadWord(currentIndex);
      }

      function loadWord(index) {
        // Ẩn đáp án đi mỗi khi đổi sang từ khác
        document.getElementById("pinyin-correct").classList.add("hidden");
        document.getElementById("meaning").classList.add("hidden");
        document.getElementById("hint").classList.add("hidden");
        document.getElementById("btnReveal").style.display = "block"; // Hiện lại nút xem đáp án

        if (!vocabularyData || vocabularyData.length === 0) {
          document.getElementById("wordWrapper").innerHTML = '<div class="chinese-word">Chưa có dữ liệu</div>';
          document.getElementById("word-count").innerText = "Từ: 0 / 0";
          document.getElementById("progressBar").style.width = "0%";
          document.getElementById("pinyin-correct").innerText = "Phiên âm: ...";
          document.getElementById("meaning").innerText = "Nghĩa từ vựng";
          document.getElementById("hint").innerText = "";
          document.getElementById("btnReveal").style.display = "none";
          return;
        }

        currentIndex = index;
        const currentItem = vocabularyData[currentIndex];
        
        document.getElementById("word-count").innerText = `Từ: ${currentIndex + 1} / ${vocabularyData.length}`;
        document.getElementById("progressBar").style.width = `${((currentIndex + 1) / vocabularyData.length) * 100}%`;

        document.getElementById("btnPrev").disabled = currentIndex === 0;
        document.getElementById("btnNext").disabled = currentIndex === vocabularyData.length - 1;

        // Chuẩn bị sẵn dữ liệu vào các thẻ (nhưng vẫn đang bị ẩn class hidden)
        document.getElementById("pinyin-correct").innerText = `Phiên âm: ${currentItem.pinyin || ""}`;
        document.getElementById("meaning").innerText = `Nghĩa: ${currentItem.nghia || ""}`;
        document.getElementById("hint").innerText = currentItem.goi_y ? `Mẹo nhớ: ${currentItem.goi_y}` : "";

        const wordWrapper = document.getElementById("wordWrapper");
        wordWrapper.innerHTML = "";
        writerInstances = [];

        if (!isWriteMode) {
          // CHẾ ĐỘ NHÌN CHỮ
          const txtDiv = document.createElement("div");
          txtDiv.className = "chinese-word";
          txtDiv.id = "word";
          txtDiv.innerText = currentItem.tu_vung;
          txtDiv.onclick = speak;
          wordWrapper.appendChild(txtDiv);
        } else {
          // CHẾ ĐỘ TẬP VIẾT
          const chars = currentItem.tu_vung.split("");
          const themeMode = document.documentElement.getAttribute("data-theme") === "light" ? "light" : "dark";
          const strokeColor = themeMode === "light" ? "#2f3542" : "#f1f2f6";
          const gridColor = themeMode === "light" ? "#ced4da" : "#3d4659";

          chars.forEach((char, idx) => {
            const containerId = `writer-char-${idx}`;
            const box = document.createElement("div");
            box.className = "writer-container";
            box.id = containerId;
            wordWrapper.appendChild(box);

            const writer = HanziWriter.create(containerId, char, {
              width: 150,
              height: 150,
              padding: 5,
              showOutline: true,
              strokeColor: strokeColor,
              outlineColor: themeMode === "light" ? "#e9ecef" : "#2c313d",
              drawingColor: "#ff4757",
              radicalColor: "#374151",
              gridColor: gridColor,
              showCharacter: false
            });
            writer.quiz();
            writerInstances.push(writer);
          });
        }
        
        speak();
      }

      function revealAnswer() {
        if (vocabularyData.length === 0) return;
        // Hiển thị nội dung đáp án
        document.getElementById("pinyin-correct").classList.remove("hidden");
        document.getElementById("meaning").classList.remove("hidden");
        document.getElementById("hint").classList.remove("hidden");
        // Ẩn chính nút xem đáp án đi sau khi bấm
        document.getElementById("btnReveal").style.display = "none";
        
        // Nếu ở chế độ tập viết, show luôn chữ gốc để đối chiếu
        if (isWriteMode && writerInstances.length > 0) {
          writerInstances.forEach(writer => writer.showCharacter());
        }
      }

      function toggleWriteMode() {
        isWriteMode = !isWriteMode;
        const btn = document.getElementById("btnWriteMode");
        if (isWriteMode) {
          btn.innerText = "✍️ Chế độ: Tập Viết";
          btn.classList.add("active");
        } else {
          btn.innerText = "✍️ Chế độ: Nhìn Chữ";
          btn.classList.remove("active");
        }
        loadWord(currentIndex);
      }

      function prevWord() {
        if (currentIndex > 0) loadWord(currentIndex - 1);
      }
      
      function nextWord() {
        if (currentIndex < vocabularyData.length - 1) loadWord(currentIndex + 1);
      }

      function speak() {
        if (vocabularyData.length === 0 || typeof speechSynthesis === 'undefined') return;
        window.speechSynthesis.cancel();
        setTimeout(() => {
          const text = vocabularyData[currentIndex].tu_vung;
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = "zh-CN";
          utterance.rate = 0.8; 
          window.speechSynthesis.speak(utterance);
        }, 80);
      }
    </script>
  </body>
</html>
